workflows:
  android-build:
    name: Android APK Build
    max_build_duration: 30
    environment:
      java: 17

    scripts:
      - name: Checkout
        script: git clone $CM_REPOSITORY_URL .

      - name: Build APK
        script: ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/apk/debug/*.apk